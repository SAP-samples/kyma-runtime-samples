apiVersion: gateway.kyma-project.io/v2
kind: APIRule
metadata:
  name: api-postgres-go
spec:
  hosts:
    - api-postgres-go
  service:
    name: api-postgres-go
    port: 80
  gateway: kyma-system/kyma-gateway
  corsPolicy: 
    allowHeaders:
      - Content-Type
    allowMethods:
      - GET
      - POST
      - PUT
      - DELETE
      - OPTIONS
    allowOrigins:
      - regex: ".*{YOUR_DOMAIN}"
      - exact: http://localhost:8080
  rules:
    - path: "/orders"
      methods:
      - GET
      - POST
      - PUT
      - DELETE
      - OPTIONS
      noAuth: true
    - path: "/orders/{**}"
      methods:
      - GET
      - POST
      - PUT
      - DELETE
      - OPTIONS
      noAuth: true